name: Build Privacy Filter Desktop App

on:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04-arm, windows-latest, macos-latest]
        include:
          - os: ubuntu-22.04
            artifact_name: PrivacyFilterApp-ubuntu-latest
            zip_name: PrivacyFilterApp-ubuntu-latest.zip
          - os: ubuntu-24.04-arm
            artifact_name: PrivacyFilterApp-ubuntu-24.04-arm
            zip_name: PrivacyFilterApp-ubuntu-24.04-arm.zip
          - os: windows-latest
            artifact_name: PrivacyFilterApp-windows-latest
            zip_name: PrivacyFilterApp-windows-latest.zip
          - os: macos-latest
            artifact_name: PrivacyFilterApp-macos-latest
            zip_name: PrivacyFilterApp-macos-latest.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev poppler-utils \
            libglib2.0-0 libsm6 libxext6 libxrender1

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install tesseract poppler

      - name: Install System Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install tesseract -y
          echo "C:\Program Files\Tesseract-OCR" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir --extra-index-url https://download.pytorch.org/whl/cpu \
            torch==2.5.1 \
            transformers==5.6.2 \
            accelerate==1.10.0 \
            safetensors==0.5.2 \
            huggingface-hub==1.12.0 \
            tokenizers==0.22.2
          pip install --no-cache-dir \
            fastapi==0.115.4 \
            "uvicorn[standard]==0.32.0" \
            python-multipart==0.0.12 \
            jinja2==3.1.4 \
            pydantic==2.9.2 \
            pypdf==5.1.0 \
            pdfplumber==0.11.4 \
            pdf2image==1.17.0 \
            python-docx==1.1.2 \
            Pillow==11.0.0 \
            pytesseract==0.3.13 \
            pydicom==3.0.1 \
            "numpy>=1.26,<3" \
            pymupdf==1.24.13 \
            python-dotenv==1.0.1 \
            "python-jose[cryptography]==3.3.0" \
            email-validator==2.1.1 \
            httpx==0.27.0
          pip install --no-cache-dir customtkinter pyinstaller

      - name: Create GUI launcher
        shell: bash
        run: |
          cat > privacy_filter_gui.py << 'PYEOF'
          """Privacy Filter Desktop App — styled GUI launcher (models downloaded on first run)."""
          import os, sys, json, threading, tempfile, webbrowser, time
          from pathlib import Path

          os.environ["STORAGE_BACKEND"] = "local"
          os.environ["KEYCLOAK_AUTH_ENABLED"] = "false"
          os.environ["SECRET_KEY"] = "local-desktop-key"
          os.environ["DEMO_TOKEN_EXPIRY_DAYS"] = "365"

          if getattr(sys, "frozen", False):
              base = Path(sys._MEIPASS)
          else:
              base = Path(__file__).parent

          model_cache = Path.home() / ".privacy_filter" / "models"
          model_cache.mkdir(parents=True, exist_ok=True)
          os.environ.setdefault("HF_HOME", str(model_cache))
          os.environ.setdefault("HUGGINGFACE_HUB_CACHE", str(model_cache / "hub"))
          os.environ.setdefault("TRANSFORMERS_CACHE", str(model_cache / "hub"))

          data_dir = Path(tempfile.gettempdir()) / "privacy_filter_data"
          data_dir.mkdir(parents=True, exist_ok=True)
          (data_dir / "uploads").mkdir(exist_ok=True)
          (data_dir / "redacted").mkdir(exist_ok=True)
          os.environ["LOCAL_DATA_DIR"] = str(data_dir)

          import customtkinter as ctk

          BRAND      = "#14868C"
          BRAND_DARK = "#0E6C71"
          BRAND_BG   = "#F0FDFA"
          GRAY_50    = "#F8FAFC"
          GRAY_100   = "#F1F5F9"
          GRAY_200   = "#E2E8F0"
          GRAY_500   = "#64748B"
          GRAY_700   = "#334155"
          GRAY_900   = "#0F172A"
          RED_500    = "#EF4444"
          GREEN_500  = "#22C55E"
          GREEN_BG   = "#F0FDF4"
          AMBER_BG   = "#FFFBEB"
          PORT       = 8003

          class PrivacyFilterApp(ctk.CTk):
              def __init__(self):
                  super().__init__()
                  self.title("TANUH Privacy Filter")
                  self.geometry("600x520")
                  self.minsize(560, 480)
                  ctk.set_appearance_mode("light")
                  ctk.set_default_color_theme("blue")
                  self.configure(fg_color="#FFFFFF")

                  self.server_thread = None
                  self.server_running = False
                  self.first_run = not (model_cache / "hub").exists()
                  self._start_time = None

                  # ── Header bar ──
                  header = ctk.CTkFrame(self, height=64, corner_radius=0, fg_color=BRAND)
                  header.pack(fill="x")
                  header.pack_propagate(False)

                  ctk.CTkLabel(
                      header, text="  TANUH Privacy Filter",
                      font=ctk.CTkFont(size=20, weight="bold"),
                      text_color="#FFFFFF"
                  ).pack(side="left", padx=16, pady=12)

                  self.status_dot = ctk.CTkLabel(
                      header, text="●  Offline",
                      font=ctk.CTkFont(size=13),
                      text_color="#94A3B8"
                  )
                  self.status_dot.pack(side="right", padx=20, pady=12)

                  # ── Main container ──
                  main = ctk.CTkFrame(self, fg_color="#FFFFFF")
                  main.pack(fill="both", expand=True, padx=28, pady=20)

                  # ── Info card ──
                  info_card = ctk.CTkFrame(main, fg_color=BRAND_BG, corner_radius=10, border_width=1, border_color=GRAY_200)
                  info_card.pack(fill="x", pady=(0, 16))

                  ctk.CTkLabel(
                      info_card, text="PII Detection & Redaction",
                      font=ctk.CTkFont(size=16, weight="bold"),
                      text_color=GRAY_900
                  ).pack(anchor="w", padx=16, pady=(14, 2))

                  ctk.CTkLabel(
                      info_card,
                      text="Detect and redact personal information from documents.\nPDF, DOCX, images, DICOM — all processed locally on your machine.",
                      font=ctk.CTkFont(size=12),
                      text_color=GRAY_500,
                      justify="left"
                  ).pack(anchor="w", padx=16, pady=(0, 14))

                  # ── Status panel ──
                  status_frame = ctk.CTkFrame(main, fg_color=GRAY_50, corner_radius=10, border_width=1, border_color=GRAY_200)
                  status_frame.pack(fill="x", pady=(0, 16))

                  status_top = ctk.CTkFrame(status_frame, fg_color="transparent")
                  status_top.pack(fill="x", padx=16, pady=(14, 6))

                  self.status_label = ctk.CTkLabel(
                      status_top, text="Ready to start",
                      font=ctk.CTkFont(size=14, weight="bold"),
                      text_color=GRAY_900
                  )
                  self.status_label.pack(side="left")

                  self.elapsed_label = ctk.CTkLabel(
                      status_top, text="",
                      font=ctk.CTkFont(size=12),
                      text_color=GRAY_500
                  )
                  self.elapsed_label.pack(side="right")

                  self.detail_label = ctk.CTkLabel(
                      status_frame, text="Click 'Start Server' to begin. Models will be loaded automatically.",
                      font=ctk.CTkFont(size=12),
                      text_color=GRAY_500,
                      justify="left"
                  )
                  self.detail_label.pack(anchor="w", padx=16, pady=(0, 4))

                  self.progress = ctk.CTkProgressBar(
                      status_frame, width=400, height=10,
                      corner_radius=5,
                      progress_color=BRAND,
                      fg_color=GRAY_200
                  )
                  self.progress.pack(fill="x", padx=16, pady=(4, 6))
                  self.progress.set(0)

                  self.pct_label = ctk.CTkLabel(
                      status_frame, text="",
                      font=ctk.CTkFont(size=11),
                      text_color=GRAY_500
                  )
                  self.pct_label.pack(anchor="e", padx=16, pady=(0, 12))

                  # ── Log panel ──
                  log_label = ctk.CTkLabel(
                      main, text="Activity Log",
                      font=ctk.CTkFont(size=12, weight="bold"),
                      text_color=GRAY_700
                  )
                  log_label.pack(anchor="w", pady=(0, 4))

                  self.log_box = ctk.CTkTextbox(
                      main, height=90, corner_radius=8,
                      font=ctk.CTkFont(family="Consolas, monospace", size=11),
                      fg_color=GRAY_50,
                      text_color=GRAY_700,
                      border_width=1,
                      border_color=GRAY_200,
                      state="disabled"
                  )
                  self.log_box.pack(fill="both", expand=True, pady=(0, 16))

                  # ── Button row ──
                  btn_frame = ctk.CTkFrame(main, fg_color="transparent")
                  btn_frame.pack(fill="x")

                  self.start_btn = ctk.CTkButton(
                      btn_frame, text="▶  Start Server",
                      command=self.start_server,
                      width=180, height=42,
                      corner_radius=8,
                      font=ctk.CTkFont(size=14, weight="bold"),
                      fg_color=BRAND, hover_color=BRAND_DARK
                  )
                  self.start_btn.pack(side="left", padx=(0, 10))

                  self.open_btn = ctk.CTkButton(
                      btn_frame, text="\U0001F310  Open in Browser",
                      command=self.open_browser,
                      width=180, height=42,
                      corner_radius=8,
                      font=ctk.CTkFont(size=14, weight="bold"),
                      fg_color=BRAND, hover_color=BRAND_DARK,
                      state="disabled"
                  )
                  self.open_btn.pack(side="left", padx=(0, 10))

                  url_label = ctk.CTkLabel(
                      btn_frame,
                      text=f"localhost:{PORT}",
                      font=ctk.CTkFont(size=11),
                      text_color=GRAY_500
                  )
                  url_label.pack(side="right", padx=4)

                  # ── Footer ──
                  footer = ctk.CTkLabel(
                      self, text="TANUH AI-CoE  •  Indian Institute of Science, Bangalore",
                      font=ctk.CTkFont(size=10),
                      text_color=GRAY_500
                  )
                  footer.pack(pady=(0, 8))

                  self.protocol("WM_DELETE_WINDOW", self.on_close)

              def _log(self, msg):
                  self.log_box.configure(state="normal")
                  ts = time.strftime("%H:%M:%S")
                  self.log_box.insert("end", f"[{ts}]  {msg}\n")
                  self.log_box.see("end")
                  self.log_box.configure(state="disabled")

              def start_server(self):
                  self.start_btn.configure(state="disabled", text="⏳  Starting...")
                  self._start_time = time.time()
                  if self.first_run:
                      self.status_label.configure(text="Downloading AI models (first run)...")
                      self.detail_label.configure(text="One-time download ~500 MB from HuggingFace. Please wait.")
                      self._log("First run detected — downloading models from HuggingFace")
                  else:
                      self.status_label.configure(text="Loading models from cache...")
                      self.detail_label.configure(text="Models found in ~/.privacy_filter/models/")
                      self._log("Loading cached models")
                  self.progress.set(0.05)
                  self.pct_label.configure(text="5%")
                  self.status_dot.configure(text="●  Starting", text_color="#F59E0B")
                  self.server_thread = threading.Thread(target=self._run_server, daemon=True)
                  self.server_thread.start()
                  self.after(500, self._poll_health)
                  self.after(1000, self._update_elapsed)

              def _run_server(self):
                  import uvicorn
                  sys.path.insert(0, str(base))
                  from privacy_filter.app.main import app as fastapi_app
                  self.server_running = True
                  uvicorn.run(fastapi_app, host="127.0.0.1", port=PORT, log_level="warning")

              def _update_elapsed(self):
                  if self._start_time and not self.open_btn.cget("state") == "normal":
                      elapsed = int(time.time() - self._start_time)
                      m, s = divmod(elapsed, 60)
                      self.elapsed_label.configure(text=f"{m:02d}:{s:02d}")
                      self.after(1000, self._update_elapsed)

              def _poll_health(self):
                  import urllib.request
                  try:
                      r = urllib.request.urlopen(f"http://127.0.0.1:{PORT}/api/health", timeout=2)
                      data = json.loads(r.read())
                      if data.get("model_loaded"):
                          elapsed = int(time.time() - self._start_time) if self._start_time else 0
                          m, s = divmod(elapsed, 60)
                          self.status_label.configure(text="✅  Server running — models loaded")
                          self.detail_label.configure(text=f"Ready at http://localhost:{PORT}")
                          self.progress.set(1.0)
                          self.pct_label.configure(text="100%")
                          self.status_dot.configure(text="●  Online", text_color=GREEN_500)
                          self.open_btn.configure(state="normal")
                          self.start_btn.configure(text="▶  Running", state="disabled")
                          self._log(f"Server ready in {m}m {s}s — open browser to start redacting")
                          return
                  except Exception:
                      pass
                  p = self.progress.get()
                  new_p = min(p + 0.02, 0.92)
                  self.progress.set(new_p)
                  self.pct_label.configure(text=f"{int(new_p * 100)}%")
                  if self.first_run:
                      self.status_label.configure(text="Downloading & loading models...")
                  else:
                      self.status_label.configure(text="Loading models...")
                  self.after(3000, self._poll_health)

              def open_browser(self):
                  webbrowser.open(f"http://localhost:{PORT}")
                  self._log(f"Opened browser at http://localhost:{PORT}")

              def on_close(self):
                  self.destroy()
                  os._exit(0)

          if __name__ == "__main__":
              app = PrivacyFilterApp()
              app.mainloop()
          PYEOF

      - name: Create PyInstaller spec
        shell: bash
        run: |
          cat > privacy_filter_gui.spec << 'SPECEOF'
          # -*- mode: python ; coding: utf-8 -*-
          block_cipher = None

          a = Analysis(
              ['privacy_filter_gui.py'],
              pathex=['.'],
              binaries=[],
              datas=[
                  ('privacy_filter', 'privacy_filter'),
              ],
              hiddenimports=[
                  'privacy_filter', 'privacy_filter.app', 'privacy_filter.app.main',
                  'privacy_filter.app.model', 'privacy_filter.app.ner_model',
                  'privacy_filter.app.redactor', 'privacy_filter.app.rule_detectors',
                  'privacy_filter.app.schemas', 'privacy_filter.app.storage',
                  'privacy_filter.app.stats', 'privacy_filter.app.auth',
                  'privacy_filter.app.extractors',
                  'privacy_filter.app.extractors.txt',
                  'privacy_filter.app.extractors.pdf',
                  'privacy_filter.app.extractors.docx',
                  'privacy_filter.app.extractors.image',
                  'privacy_filter.app.extractors.dicom',
                  'transformers', 'torch', 'safetensors', 'tokenizers',
                  'accelerate', 'huggingface_hub',
                  'fastapi', 'uvicorn', 'pydantic', 'starlette',
                  'pypdf', 'pdfplumber', 'docx', 'fitz',
                  'pytesseract', 'pydicom', 'PIL',
                  'jose', 'dotenv', 'httpx',
                  'customtkinter',
              ],
              hookspath=[],
              runtime_hooks=[],
              excludes=[
                  'matplotlib', 'scipy', 'pandas', 'notebook', 'IPython',
                  'torch.distributed', 'torch.testing', 'torch.utils.tensorboard',
              ],
              cipher=block_cipher,
              noarchive=False,
          )

          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

          exe = EXE(
              pyz, a.scripts, a.binaries, a.datas,
              name='PrivacyFilterApp',
              debug=False, strip=False, upx=True,
              console=False,
              onefile=True,
          )
          SPECEOF

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller privacy_filter_gui.spec

      - name: Zip Artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -9 ${{ matrix.zip_name }} PrivacyFilterApp
          ls -lh ${{ matrix.zip_name }}

      - name: Zip Artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          Compress-Archive -Path PrivacyFilterApp.exe -DestinationPath ${{ matrix.zip_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.zip_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/PrivacyFilterApp-ubuntu-latest/PrivacyFilterApp-ubuntu-latest.zip       release/
          cp artifacts/PrivacyFilterApp-ubuntu-24.04-arm/PrivacyFilterApp-ubuntu-24.04-arm.zip release/
          cp artifacts/PrivacyFilterApp-windows-latest/PrivacyFilterApp-windows-latest.zip     release/
          cp artifacts/PrivacyFilterApp-macos-latest/PrivacyFilterApp-macos-latest.zip         release/
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: privacy-filter-desktop-v1.1.0
          name: "Privacy Filter Desktop App v1.1.0"
          body: |
            ## Privacy Filter Desktop App v1.1.0

            Styled GUI application for PII detection and redaction. Runs a local FastAPI server with a browser-based interface.

            **What's included:**
            - Branded TANUH UI with activity log and progress tracking
            - Auto-downloads AI models (~500 MB) on first launch, cached for future use
            - Supports PDF, DOCX, images, DICOM, CSV, TXT, and more
            - Fully offline after initial model download

            **Models:** `openai/privacy-filter` + `dslim/bert-base-NER`
            **Cache:** `~/.privacy_filter/models/`

            ### Downloads

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `PrivacyFilterApp-ubuntu-latest.zip` |
            | Linux ARM64 | `PrivacyFilterApp-ubuntu-24.04-arm.zip` |
            | Windows x86_64 | `PrivacyFilterApp-windows-latest.zip` |
            | macOS (Apple Silicon / Intel) | `PrivacyFilterApp-macos-latest.zip` |

            ### Usage
            1. Unzip the downloaded file
            2. Run `PrivacyFilterApp` (Linux/macOS: `chmod +x PrivacyFilterApp` first)
            3. Click **Start Server** — models download on first run
            4. Click **Open in Browser** to access the redaction interface at `http://localhost:8003`
          files: release/*
          draft: false
          prerelease: false
