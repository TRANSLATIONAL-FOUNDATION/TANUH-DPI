              runtime_tmpdir=None,
              console=True,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
          )
          SPEC_EOF

      - name: Build binary with PyInstaller
        run: |
          pyinstaller --clean --noconfirm pf-redact.spec

      - name: Verify binary
        run: |
          chmod +x dist/pf-redact
          ./dist/pf-redact --help
          ./dist/pf-redact check
          echo "macOS verification passed"

      - name: Smoke test binary (end-to-end)
        run: |
          python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (400, 200), 'white')
          d = ImageDraw.Draw(img)
          d.text((10, 10), 'Patient: John Smith', fill='black')
          d.text((10, 40), 'DOB: 01/15/1990', fill='black')
          d.text((10, 70), 'MRN: 123456', fill='black')
          img.save('test_input.png')
          "
          ./dist/pf-redact test_input.png test_output.png --backend tesseract --json test_report.json
          test -f test_output.png || { echo "FAIL: output image not created"; exit 1; }
          test -f test_report.json || { echo "FAIL: JSON report not created"; exit 1; }
          python3 -c "import json; r=json.load(open('test_report.json')); print('Smoke test report:', r); assert 'phi_count' in r"
          echo "macOS end-to-end smoke test passed"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pf-redact-macos
          path: dist/pf-redact
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 5: Create GitHub Release (only on tags)
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    needs: [build-linux, build-linux-arm64, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/pf-v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts for release
        run: |
          mkdir -p release
          cp artifacts/pf-redact-linux-x86_64/pf-redact-1.0.0-x86_64.AppImage  release/pf-redact-linux-x86_64.AppImage
          cp artifacts/pf-redact-linux-aarch64/pf-redact                        release/pf-redact-linux-aarch64
          cp artifacts/pf-redact-windows-x86_64/pf-redact.exe                   release/pf-redact-windows-x86_64.exe
          cp artifacts/pf-redact-macos/pf-redact                                release/pf-redact-macos
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Privacy Filter ${{ github.ref_name }}"
          body: |
            ## Privacy Filter ${{ github.ref_name }}

            MedDeID-powered medical de-identification executables.
            Removes PHI from medical images, DICOM/NIfTI scans, and PDF documents
            using CV-based detection + Safe Harbor rules (no ML model downloads needed).

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `pf-redact-linux-x86_64.AppImage` |
            | Linux ARM64 (aarch64) | `pf-redact-linux-aarch64` |
            | Windows x86_64 | `pf-redact-windows-x86_64.exe` |
            | macOS (Apple Silicon) | `pf-redact-macos` |

            ### Prerequisites
            - **Tesseract OCR** must be installed on your system
              - Linux: `sudo apt install tesseract-ocr`
              - macOS: `brew install tesseract`
              - Windows: Download from https://github.com/UB-Mannheim/tesseract/wiki

            ### Usage
            ```bash
            # Make executable (Linux/Mac only)
            chmod +x pf-redact-*

            # De-identify a medical image
            ./pf-redact scan.png redacted.png

            # De-identify a DICOM file
            ./pf-redact patient.dcm deidentified.dcm

            # De-identify a PDF report
            ./pf-redact report.pdf redacted.pdf

            # Save detection report as JSON
            ./pf-redact scan.png redacted.png --json report.json

            # Choose OCR backend and redaction strategy
            ./pf-redact scan.png redacted.png --backend tesseract --redactor mask
            ```

            ### Supported Formats
            - Images: `.png`, `.jpg`, `.jpeg`, `.tif`, `.tiff`, `.bmp`
            - DICOM: `.dcm`, `.dicom`
            - NIfTI: `.nii`, `.nii.gz`
            - PDF: `.pdf`
          files: release/*
          draft: false
          prerelease: false
