        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tesseract OCR
        run: |
          choco install tesseract -y
          echo "C:\Program Files\Tesseract-OCR" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install `
            opencv-python-headless==4.10.0.84 `
            "numpy>=1.26,<3" `
            Pillow==11.0.0 `
            pytesseract==0.3.13 `
            pydicom==3.0.1 `
            nibabel==5.3.2 `
            pymupdf==1.24.13
          pip install pyinstaller

      - name: Create PyInstaller entry point and spec
        shell: bash
        run: |
          cat > pf_entry.py << 'ENTRY_EOF'
          import sys, os
          sys.path.insert(0, os.path.dirname(os.path.abspath(__file__)))
          from privacy_filter.cli.main import main
          main()
          ENTRY_EOF

          cat > pf-redact.spec << 'SPEC_EOF'
          # -*- mode: python ; coding: utf-8 -*-
          from PyInstaller.utils.hooks import collect_submodules

          hidden_imports = (
              collect_submodules('privacy_filter.cli') +
              collect_submodules('privacy_filter.pipeline') +
              collect_submodules('privacy_filter.registry') +
              collect_submodules('privacy_filter.schemas') +
              collect_submodules('privacy_filter.detectors') +
              collect_submodules('privacy_filter.loaders') +
              collect_submodules('privacy_filter.metadata') +
              collect_submodules('privacy_filter.redactors') +
              collect_submodules('privacy_filter.savers') +
              collect_submodules('privacy_filter.utils') +
              collect_submodules('privacy_filter.validators') +
              collect_submodules('cv2') +
              [
                  'numpy', 'PIL', 'PIL.Image', 'PIL.ExifTags',
                  'pytesseract', 'pydicom', 'nibabel',
                  'fitz', 'pymupdf',
                  'pydicom.encoders', 'pydicom.encoders.gdcm',
                  'pydicom.encoders.pylibjpeg', 'pydicom.encoders.native',
              ]
          )

          a = Analysis(
              ['pf_entry.py'],
              pathex=['.'],
              binaries=[],
              datas=[],
              hiddenimports=hidden_imports,
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[
                  'tkinter', 'turtle', 'idlelib', 'test', 'unittest',
                  'privacy_filter.app', 'privacy_filter.tests',
                  'fastapi', 'uvicorn', 'pydantic', 'httpx', 'jose',
                  'google.cloud', 'prometheus_client',
              ],
              noarchive=False,
          )

          pyz = PYZ(a.pure)

          exe = EXE(
              pyz,
              a.scripts,
              a.binaries,
              a.datas,
              [],
              name='pf-redact',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              upx_exclude=[],
              runtime_tmpdir=None,
              console=True,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
          )
          SPEC_EOF

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --clean --noconfirm pf-redact.spec

      - name: Verify exe
        run: |
          .\dist\pf-redact.exe --help
          .\dist\pf-redact.exe check
          echo "Windows verification passed"

      - name: Smoke test exe (end-to-end)
        shell: bash
        run: |
          python -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (400, 200), 'white')
          d = ImageDraw.Draw(img)
          d.text((10, 10), 'Patient: John Smith', fill='black')
          d.text((10, 40), 'DOB: 01/15/1990', fill='black')
          d.text((10, 70), 'MRN: 123456', fill='black')
          img.save('test_input.png')
          "
          ./dist/pf-redact.exe test_input.png test_output.png --backend tesseract --json test_report.json
          test -f test_output.png || { echo "FAIL: output image not created"; exit 1; }
          test -f test_report.json || { echo "FAIL: JSON report not created"; exit 1; }
          python -c "import json; r=json.load(open('test_report.json')); print('Smoke test report:', r); assert 'phi_count' in r"
          echo "Windows end-to-end smoke test passed"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: pf-redact-windows-x86_64
          path: dist/pf-redact.exe
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4: macOS -- PyInstaller binary
  # ═══════════════════════════════════════════════════════════════════════════
  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tesseract OCR
        run: |
          brew install tesseract

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            opencv-python-headless==4.10.0.84 \
            "numpy>=1.26,<3" \
            Pillow==11.0.0 \
            pytesseract==0.3.13 \
            pydicom==3.0.1 \
