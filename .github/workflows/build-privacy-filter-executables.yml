          )

          a = Analysis(
              ['pf_entry.py'],
              pathex=['.'],
              binaries=[],
              datas=[],
              hiddenimports=hidden_imports,
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[
                  'tkinter', 'turtle', 'idlelib', 'test', 'unittest',
                  'privacy_filter.app', 'privacy_filter.tests',
                  'fastapi', 'uvicorn', 'pydantic', 'httpx', 'jose',
