name: Build Executables

# ─── Trigger ────────────────────────────────────────────────────────────────
# Run manually from GitHub UI, or on tagged releases
on:
  workflow_dispatch:          # Manual trigger from Actions tab
  push:
    tags:
      - 'v*'                  # Auto-trigger on version tags (v1.0.0, v1.1.0, etc.)

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: Linux -- AppImage
  # ═══════════════════════════════════════════════════════════════════════════
  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 rsync wget

      - name: Build AppImage
        working-directory: nhcx-local
        run: |
          chmod +x build_appimage.sh
          ./build_appimage.sh

      - name: Verify AppImage
        working-directory: nhcx-local
        run: |
          chmod +x nhcx-extract-1.0.0-x86_64.AppImage
          ./nhcx-extract-1.0.0-x86_64.AppImage --version
          ./nhcx-extract-1.0.0-x86_64.AppImage --help

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nhcx-extract-linux-x86_64
          path: nhcx-local/nhcx-extract-1.0.0-x86_64.AppImage
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1b: Linux -- AppImage (ARM64)
  # ═══════════════════════════════════════════════════════════════════════════
  build-linux-arm64:
    name: Linux ARM64 (binary)
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: nhcx-local
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install .
          pip install pyinstaller

      - name: Build binary with PyInstaller
        working-directory: nhcx-local
        run: |
          pyinstaller --clean --noconfirm nhcx-extract.spec

      - name: Verify binary
        working-directory: nhcx-local
        run: |
          chmod +x dist/nhcx-extract
          ./dist/nhcx-extract --version
          ./dist/nhcx-extract --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nhcx-extract-linux-aarch64
          path: nhcx-local/dist/nhcx-extract
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Windows -- PyInstaller .exe
  # ═══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: Windows (exe)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: nhcx-local
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install .
          pip install pyinstaller

      - name: Build exe with PyInstaller
        working-directory: nhcx-local
        run: |
          pyinstaller --clean --noconfirm nhcx-extract.spec

      - name: Verify exe
        working-directory: nhcx-local
        run: |
          .\dist\nhcx-extract.exe --version
          .\dist\nhcx-extract.exe --help

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: nhcx-extract-windows-x86_64
          path: nhcx-local/dist/nhcx-extract.exe
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3: macOS -- PyInstaller binary
  # ═══════════════════════════════════════════════════════════════════════════
  build-macos:
    name: macOS (universal)
    runs-on: macos-latest      # Apple Silicon (M1+) runner
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: nhcx-local
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install .
          pip install pyinstaller

      - name: Build binary with PyInstaller
        working-directory: nhcx-local
        run: |
          pyinstaller --clean --noconfirm nhcx-extract.spec

      - name: Verify binary
        working-directory: nhcx-local
        run: |
          chmod +x dist/nhcx-extract
          ./dist/nhcx-extract --version
          ./dist/nhcx-extract --help

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nhcx-extract-macos
          path: nhcx-local/dist/nhcx-extract
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4: Create GitHub Release (only on tags)
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    needs: [build-linux, build-linux-arm64, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write          # Needed to create releases

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts for release
        run: |
          mkdir -p release
          cp artifacts/nhcx-extract-linux-x86_64/nhcx-extract-1.0.0-x86_64.AppImage  release/nhcx-extract-linux-x86_64.AppImage
          cp artifacts/nhcx-extract-linux-aarch64/nhcx-extract                        release/nhcx-extract-linux-aarch64
          cp artifacts/nhcx-extract-windows-x86_64/nhcx-extract.exe                   release/nhcx-extract-windows-x86_64.exe
          cp artifacts/nhcx-extract-macos/nhcx-extract                                 release/nhcx-extract-macos
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NHCX Extract ${{ github.ref_name }}"
          body: |
            ## NHCX Extract ${{ github.ref_name }}

            Single-file executables for extracting FHIR bundles from clinical and insurance PDFs using a local LLM.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `nhcx-extract-linux-x86_64.AppImage` |
            | Linux ARM64 (aarch64) | `nhcx-extract-linux-aarch64` |
            | Windows x86_64 | `nhcx-extract-windows-x86_64.exe` |
            | macOS (Apple Silicon) | `nhcx-extract-macos` |

            ### Prerequisites
            1. Install [Ollama](https://ollama.com/download)
            2. Pull the model: `ollama pull gemma4:26b`

            ### Usage
            ```bash
            # Make executable (Linux/Mac only)
            chmod +x nhcx-extract-*

            # Check setup
            ./nhcx-extract check -m gemma4:26b

            # Extract clinical PDF
            ./nhcx-extract abdm report.pdf -o result.json -m gemma4:26b

            # Extract insurance PDF
            ./nhcx-extract nhcx policy.pdf -o result.json -m gemma4:26b
            ```
          files: release/*
          draft: false
          prerelease: false
