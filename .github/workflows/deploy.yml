# Deployment is handled internally within GCP — no external authentication.
#
# All services (VMs, Cloud SQL, GCS, Secret Manager, Redis) communicate via
# the VPC using the attached service account (sa-dpi-app-prod) and ADC.
#
# To deploy after pushing to main:
#
#   Option A — MIG rolling replace (recommended):
#     gcloud compute instance-groups managed rolling-action replace \
#       dpi-mig --region=asia-south1 --project=proj-dpi-shared \
#       --max-surge=1 --max-unavailable=0
#
#   Option B — Update the standalone VM (tanuh-dpi):
#     gcloud compute ssh tanuh-dpi --zone=asia-south1-c \
#       --project=proj-dpi-shared --tunnel-through-iap \
#       --command="cd /home/miglab/TANUH-DPI && git fetch --depth 1 origin main && git checkout -f FETCH_HEAD && cp docker-compose.prod.yml docker-compose.yml && cp .env.prod .env && docker compose build --parallel && docker compose up -d --remove-orphans"
#
#   Option C — Cloud Build trigger (set up once in GCP Console):
#     Connect this GitHub repo to Cloud Build, create a trigger on push to main,
#     and have it run the MIG rolling replace command above.
#
# MIG instances run deploy/bootstrap-vm.sh as their startup script, which
# pulls the latest code from main and starts the stack automatically.

name: "[Disabled] Deploy docs"

on:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Deployment info
        run: |
          echo "Deployment is managed internally within GCP."
          echo "See the comments at the top of this file for instructions."
          echo ""
          echo "To deploy:"
          echo "  gcloud compute instance-groups managed rolling-action replace \\"
          echo "    dpi-mig --region=asia-south1 --project=proj-dpi-shared \\"
          echo "    --max-surge=1 --max-unavailable=0"
