# Deploy to proj-dpi-shared VM via IAP tunnel.
#
# Prerequisites (one-time GCP setup):
#   1. Create a Workload Identity Pool + GitHub OIDC provider:
#        gcloud iam workload-identity-pools create github-actions \
#          --location=global --project=proj-dpi-shared
#        gcloud iam workload-identity-pools providers create-oidc github \
#          --location=global --workload-identity-pool=github-actions \
#          --issuer-uri="https://token.actions.githubusercontent.com" \
#          --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository" \
#          --project=proj-dpi-shared
#
#   2. Grant sa-dpi-app-prod the workload identity user role for this repo:
#        gcloud iam service-accounts add-iam-policy-binding \
#          sa-dpi-app-prod@proj-dpi-shared.iam.gserviceaccount.com \
#          --role=roles/iam.workloadIdentityUser \
#          --member="principalSet://iam.googleapis.com/projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/github-actions/attribute.repository/TRANSLATIONAL-FOUNDATION/TANUH-DPI" \
#          --project=proj-dpi-shared
#
#   3. Set these GitHub repo secrets:
#        GCP_WORKLOAD_IDENTITY_PROVIDER = projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/github-actions/providers/github
#        GCP_SERVICE_ACCOUNT            = sa-dpi-app-prod@proj-dpi-shared.iam.gserviceaccount.com

name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to VM
        run: |
          gcloud compute ssh tanuh-dpi \
            --zone=asia-south1-c \
            --project=proj-dpi-shared \
            --tunnel-through-iap \
            --command="
              cd /home/miglab/TANUH-DPI &&
              git fetch --depth 1 origin main &&
              git checkout -f FETCH_HEAD &&
              cp docker-compose.prod.yml docker-compose.yml &&
              cp .env.prod .env &&
              docker compose build --parallel &&
              docker compose up -d --remove-orphans &&
              echo 'Deploy complete at $(date -u)'
            "
