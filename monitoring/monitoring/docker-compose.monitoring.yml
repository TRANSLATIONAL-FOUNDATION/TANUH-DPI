services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=4GB
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring_internal
      - app_network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed \
          -e "s|\$${ALERTMANAGER_SMTP_HOST}|$${ALERTMANAGER_SMTP_HOST}|g" \
          -e "s|\$${ALERTMANAGER_SMTP_FROM}|$${ALERTMANAGER_SMTP_FROM}|g" \
          -e "s|\$${ALERTMANAGER_SMTP_USERNAME}|$${ALERTMANAGER_SMTP_USERNAME}|g" \
          -e "s|\$${ALERTMANAGER_SMTP_PASSWORD}|$${ALERTMANAGER_SMTP_PASSWORD}|g" \
          -e "s|\$${ALERTMANAGER_EMAIL_TO}|$${ALERTMANAGER_EMAIL_TO}|g" \
          /etc/alertmanager/alertmanager.yml > /tmp/alertmanager-resolved.yml && \
        exec /bin/alertmanager \
          --config.file=/tmp/alertmanager-resolved.yml \
          --storage.path=/alertmanager \
          --web.listen-address=:9093
    env_file:
      - ./secrets/alertmanager.env
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    depends_on:
      - prometheus
    networks:
      - monitoring_internal

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    restart: unless-stopped
    env_file:
      - ./secrets/grafana.env
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring_internal

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    networks:
      - monitoring_internal

  loki:
    image: grafana/loki:3.1.1
    container_name: loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - monitoring_internal

  promtail:
    image: grafana/promtail:3.1.1
    container_name: promtail
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - promtail_positions:/run/promtail
      - ${DOCKER_CONTAINER_LOGS_PATH:-/var/lib/docker/containers}:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - monitoring_internal

  queue-exporter:
    build:
      context: ../../monitoring/queue-exporter
      dockerfile: Dockerfile
    container_name: queue-exporter
    restart: unless-stopped
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - POLL_INTERVAL_SECONDS=15
      - METRICS_PORT=9101
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring_internal
      - app_network
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
  alertmanager_data:

networks:
  monitoring_internal:
    driver: bridge
  app_network:
    external: true
    name: tanuh-dpi_default
