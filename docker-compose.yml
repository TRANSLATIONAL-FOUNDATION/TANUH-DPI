
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  pdf2abdm:
    image: asia-south1-docker.pkg.dev/proj-dpi-shared/dpi-containers/pdf2abdm:${IMAGE_TAG:-v1.0.0}
    build:
      context: .
      dockerfile: pdf2abdm/Dockerfile
    container_name: pdf2abdm
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://10.250.123.43:6379/0
      - SESSION_LOGGER_URL=http://session-logger:8002
      - ABDM_SECRET_KEY=${ABDM_SECRET_KEY}
      - ABDM_AUTH_ENABLED=${ABDM_AUTH_ENABLED:-true}
      - ABDM_TOKEN_EXPIRY_DAYS=${ABDM_TOKEN_EXPIRY_DAYS:-7}
    volumes:
      - ./pdf_uploads:/app/pdf_uploads
      - ./fhir_results:/app/fhir_results
    depends_on:
      - redis
      - session-logger

  pdf2nhcx:
    image: asia-south1-docker.pkg.dev/proj-dpi-shared/dpi-containers/pdf2nhcx:${IMAGE_TAG:-v1.0.0}
    build:
      context: .
      dockerfile: pdf2nhcx/Dockerfile
    container_name: pdf2nhcx
    ports:
      - "8001:8001"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://10.250.123.43:6379/0
      - SESSION_LOGGER_URL=http://session-logger:8002
      - NHCX_SECRET_KEY=${NHCX_SECRET_KEY}
      - NHCX_AUTH_ENABLED=${NHCX_AUTH_ENABLED:-true}
      - NHCX_TOKEN_EXPIRY_DAYS=${NHCX_TOKEN_EXPIRY_DAYS:-7}
    volumes:
      - ./pdf_uploads:/app/pdf_uploads
      - ./nhcx_results:/app/nhcx_results
    depends_on:
      - redis
      - session-logger

  # ── NHCX Insurance Workers (4 replicas × concurrency 2 = 8 slots) ───────────
  celery-nhcx-worker:
    image: asia-south1-docker.pkg.dev/proj-dpi-shared/dpi-containers/celery-nhcx-worker:${IMAGE_TAG:-v1.0.0}
    build:
      context: .
      dockerfile: worker/Dockerfile
    deploy:
      replicas: 4
    command: celery -A common.celery_app worker --loglevel=info --concurrency=2 -Q nhcx -I pdf2nhcx.tasks -n nhcx-worker@%h
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://10.250.123.43:6379/0
      - PYTHONPATH=/app
      - WORKER_METRICS_PORT=9200
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
    volumes:
      - ./pdf_uploads:/app/pdf_uploads
      - ./fhir_results:/app/fhir_results
      - ./nhcx_results:/app/nhcx_results
    depends_on:
      - redis

  # ── ABDM Clinical Workers (4 replicas × concurrency 2 = 8 slots) ─────────────
  celery-abdm-worker:
    image: asia-south1-docker.pkg.dev/proj-dpi-shared/dpi-containers/celery-abdm-worker:${IMAGE_TAG:-v1.0.0}
    build:
      context: .
      dockerfile: worker/Dockerfile
    deploy:
      replicas: 4
    command: celery -A common.celery_app worker --loglevel=info --concurrency=2 -Q abdm -I pdf2abdm.tasks -n abdm-worker@%h
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://10.250.123.43:6379/0
      - PYTHONPATH=/app
      - WORKER_METRICS_PORT=9200
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
    volumes:
      - ./pdf_uploads:/app/pdf_uploads
      - ./fhir_results:/app/fhir_results
      - ./nhcx_results:/app/nhcx_results
    depends_on:
      - redis


  frontend:
    image: asia-south1-docker.pkg.dev/proj-dpi-shared/dpi-containers/frontend:${IMAGE_TAG:-v1.0.0}
    build: 
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend-service
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - pdf2abdm
      - pdf2nhcx

  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
    container_name: cloud-sql-proxy
    command:
      - "proj-dpi-shared:asia-south1:tanuh-dpi-mysql"
      - "--address=0.0.0.0"
      - "--port=3306"
    # Keyless: authenticates as the VM's attached SA (sa-dpi-app-prod) via ADC /
    # metadata server. No gcp-service-account.json on this VM.
    restart: unless-stopped

  session-logger:
    image: asia-south1-docker.pkg.dev/proj-dpi-shared/dpi-containers/session-logger:${IMAGE_TAG:-v1.0.0}
    build:
      context: .
      dockerfile: session_logger/Dockerfile
    container_name: session-logger
    ports:
      - "8002:8002"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - MYSQL_USER=${MYSQL_USER:-}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}
      - MYSQL_HOST=cloud-sql-proxy
      - MYSQL_DB=dpi_session_logger
      - SQLITE_DATA_DIR=/app/data
      - FIREBASE_SERVICE_ACCOUNT_KEY_SECRET=firebase-admin-sdk-key
    volumes:
      - ./session_logger_data:/app/data
    depends_on:
      - cloud-sql-proxy

  privacy-filter:
    image: asia-south1-docker.pkg.dev/proj-dpi-shared/dpi-containers/privacy-filter:${IMAGE_TAG:-v1.0.0}
    build:
      context: .
      dockerfile: privacy_filter/Dockerfile
    container_name: privacy-filter
    ports:
      - "8003:8003"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - STORAGE_BACKEND=gcs
      - PRIVACY_GCS_BUCKET=dpi-privacy-temp
      - PF_FILE_TTL_SECONDS=1800
      - TASK_RESULT_TTL=1800
      - LOCAL_DATA_DIR=/tmp/data
      - KEYCLOAK_AUTH_ENABLED=false
      - SESSION_LOGGER_URL=http://session-logger:8002
      - REDIS_URL=redis://10.250.123.43:6379/0
    volumes:
      - ./privacy_filter_data:/tmp/data
    depends_on:
      - redis
      - session-logger

  # ── Privacy Filter Workers (4 replicas × concurrency 2 = 8 parallel slots) ──
  celery-privacy-worker:
    image: asia-south1-docker.pkg.dev/proj-dpi-shared/dpi-containers/celery-privacy-worker:${IMAGE_TAG:-v1.0.0}
    build:
      context: .
      dockerfile: privacy_filter/Dockerfile
    deploy:
      replicas: 4
    command: >
      celery -A privacy_filter.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q privacy_filter
      -n privacy-worker@%h
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - REDIS_URL=redis://10.250.123.43:6379/0
      - STORAGE_BACKEND=gcs
      - PRIVACY_GCS_BUCKET=dpi-privacy-temp
      - PF_FILE_TTL_SECONDS=1800
      - TASK_RESULT_TTL=1800
      - LOCAL_DATA_DIR=/tmp/data
      - SESSION_LOGGER_URL=http://session-logger:8002
      - WORKER_METRICS_PORT=9200
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
    volumes:
      - ./privacy_filter_data:/tmp/data
    depends_on:
      - redis

  forgensic:
    image: asia-south1-docker.pkg.dev/proj-dpi-shared/dpi-containers/forgensic:${IMAGE_TAG:-v1.0.0}
    build:
      context: .
      dockerfile: forgensic/Dockerfile
    container_name: forgensic
    ports:
      - "8004:8004"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DATA_DIR=/app/forgensic_data
      - MAX_UPLOAD_BYTES=26214400
      - PROJECT_ID=proj-dpi-shared
      - FORGENSIC_SECRET_KEY_SECRET=forgensic-secret-key
      - REDIS_PASSWORD_SECRET=redis-password
      - OCR_ENABLED=true
      - PIPELINE_PRESET=super_loose
      - FORGENSIC_SECRET_KEY=${FORGENSIC_SECRET_KEY}
      - FORGENSIC_AUTH_ENABLED=${FORGENSIC_AUTH_ENABLED:-true}
      - FORGENSIC_TOKEN_EXPIRY_DAYS=${FORGENSIC_TOKEN_EXPIRY_DAYS:-1}
      - REDIS_URL=redis://10.250.123.43:6379/0
    volumes:
      - ./forgensic_data:/app/forgensic_data
    depends_on:
      - redis

  # ── Forgensic CV Workers (4 replicas × concurrency 2 = 8 parallel job slots) ──
  # Uses the same image as the forgensic API — CMD is overridden to start Celery.
  # Scale up replicas for more throughput; scale concurrency for more parallelism
  # per machine (keep concurrency ≤ CPU cores to avoid context-switch overhead).
  celery-forgensic-worker:
    image: asia-south1-docker.pkg.dev/proj-dpi-shared/dpi-containers/celery-forgensic-worker:${IMAGE_TAG:-v1.0.0}
    build:
      context: .
      dockerfile: forgensic/Dockerfile
    deploy:
      replicas: 4
    command: >
      celery -A forgensic.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q forgensic
      -n forgensic-worker@%h
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DATA_DIR=/app/forgensic_data
      - OCR_ENABLED=true
      - PIPELINE_PRESET=super_loose
      - REDIS_URL=redis://10.250.123.43:6379/0
      - JOB_TTL_SECONDS=3600
      - PROJECT_ID=proj-dpi-shared
      - REDIS_PASSWORD_SECRET=redis-password
      - FORGENSIC_SECRET_KEY=${FORGENSIC_SECRET_KEY}
      - WORKER_METRICS_PORT=9200
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
    volumes:
      - ./forgensic_data:/app/forgensic_data
    depends_on:
      - redis